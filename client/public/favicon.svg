<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Receipt shape -->
  <rect x="136" y="100" width="240" height="300" rx="16" fill="white" opacity="0.95"/>
  <!-- Zigzag bottom of receipt -->
  <polygon points="136,400 156,380 176,400 196,380 216,400 236,380 256,400 276,380 296,400 316,380 336,400 356,380 376,400 376,420 136,420" fill="white" opacity="0.95"/>
  <!-- Lines on receipt -->
  <rect x="160" y="140" width="100" height="12" rx="6" fill="#6366f1" opacity="0.4"/>
  <rect x="160" y="170" width="160" height="10" rx="5" fill="#e5e7eb"/>
  <rect x="160" y="192" width="140" height="10" rx="5" fill="#e5e7eb"/>
  <rect x="160" y="214" width="150" height="10" rx="5" fill="#e5e7eb"/>
  <rect x="160" y="236" width="130" height="10" rx="5" fill="#e5e7eb"/>
  <!-- Divider -->
  <rect x="160" y="262" width="192" height="2" rx="1" fill="#e5e7eb"/>
  <!-- Total line -->
  <rect x="160" y="278" width="80" height="12" rx="6" fill="#6366f1" opacity="0.6"/>
  <rect x="280" y="278" width="72" height="12" rx="6" fill="#6366f1"/>
  <!-- Split arrow icon -->
  <circle cx="256" cy="430" r="36" fill="#6366f1"/>
  <text x="256" y="443" text-anchor="middle" font-size="32" fill="white">÷</text>
</svg>
